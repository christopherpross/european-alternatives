# DEPLOYMENT WORKFLOW
#
# dist/ is gitignored so developers never commit build artifacts manually.
# This workflow handles it: on every push to main it builds the project,
# force-commits dist/ back to main (with [skip ci] to avoid loops), and
# then deploys to GitHub Pages.
#
# Hostinger auto-pulls from main and serves static files from dist/.
# GitHub Pages gets the same build via the upload-pages-artifact action.
#
# TL;DR: just push source changes — dist/ takes care of itself.

name: Deploy to GitHub Pages

on:
  push:
    branches: ['main']
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: 'pages'
  cancel-in-progress: true

jobs:
  build:
    if: "!contains(github.event.head_commit.message, '[skip ci]')"
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Scan for secrets
        run: npm run secrets:scan

      - name: Audit dependencies
        run: npm audit --audit-level=high

      - name: Run tests
        run: npm test

      - name: Type check
        run: npx tsc --noEmit --project tsconfig.app.json

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

      - name: Commit dist to main (for Hostinger)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -f dist/
          if git diff --cached --quiet; then
            echo "No dist changes to commit"
          else
            git commit -m "chore: rebuild dist artifacts [skip ci]"
            git push
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: './dist'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  verify-production-hsts:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    needs: deploy
    # This job runs two live smoke tests, each with a 10-minute propagation retry
    # window plus its own test timeout buffer. Keep enough headroom for both tests
    # and the npm install/setup time so deploy verification can complete reliably.
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Verify live HSTS on Hostinger
        env:
          EUROALT_LIVE_BASE_URL: https://european-alternatives.cloud
          EUROALT_LIVE_VERIFY_TIMEOUT_MS: '600000'
          EUROALT_LIVE_VERIFY_INTERVAL_MS: '15000'
        run: npm test -- --run tests/hsts-live-deployment.test.ts

      - name: Verify live CSP-compatible HTML on Hostinger
        env:
          EUROALT_LIVE_BASE_URL: https://european-alternatives.cloud
          EUROALT_LIVE_VERIFY_TIMEOUT_MS: '600000'
          EUROALT_LIVE_VERIFY_INTERVAL_MS: '15000'
        run: npm test -- --run tests/csp-live-deployment.test.ts
